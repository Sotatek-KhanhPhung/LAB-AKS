trigger:
  branches:
    include:
      - main

pool:
  name: default

variables:
- group: backend-variables

steps:
- checkout: self

- task: Docker@2
  displayName: Build and push image to ACR
  inputs:
    command: buildAndPush
    containerRegistry: $(dockerRegistryServiceConnection)
    repository: $(imageRepository)
    dockerfile: Dockerfile
    tags: |
      $(Build.BuildId)
      latest

